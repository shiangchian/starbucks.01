<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作成功 - 星巴克 Starbucks</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans TC', sans-serif;
            /* 與 login.html 相同的漸層背景 */
            background: linear-gradient(135deg, #F0E6D2 0%, #C3B091 100%);
            overflow: hidden;
        }

        /* 背景漂浮物特效 */
        .background-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.1; background-image: radial-gradient(circle at 20% 80%, #ffffff 0%, transparent 50%), radial-gradient(circle at 80% 20%, #ffffff 0%, transparent 50%); z-index: 0; }
        .floating-element { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.15); animation: float 6s ease-in-out infinite; z-index: 0; }
        .floating-element:nth-child(1) { width: 120px; height: 120px; top: 15%; left: 15%; animation-delay: 0s; }
        .floating-element:nth-child(2) { width: 80px; height: 80px; top: 65%; right: 10%; animation-delay: 2s; }
        .floating-element:nth-child(3) { width: 60px; height: 60px; bottom: 20%; left: 25%; animation-delay: 4s; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

        /* 毛玻璃外層卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            z-index: 1;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 教授要求的紅框區塊 (質感升級版) */
        .professor-box {
            border: 3px solid #FF4757; /* 鮮豔的紅色邊框 */
            background: #ffffff;
            border-radius: 20px;
            padding: 50px 30px 40px 30px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255, 71, 87, 0.05);
        }

        /* 頂部打勾圖示 */
        .success-icon {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 50%;
            color: #2ED573;
            font-size: 70px;
            text-shadow: 0 10px 20px rgba(46, 213, 115, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s backwards;
        }
        @keyframes popIn { 0% { transform: translateX(-50%) scale(0); } 100% { transform: translateX(-50%) scale(1); } }

        /* 教授要求的：綠字標題 */
        .msg-title {
            color: #2ED573;
            font-size: 38px;
            font-weight: 900;
            margin: 10px 0 15px 0;
            letter-spacing: 2px;
        }

        /* 教授要求的：紅字副標題 */
        .msg-welcome {
            color: #FF4757;
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 35px 0;
        }

        /* 教授要求的：黑框雙按鈕 (圓角膠囊美化版) */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-custom {
            border: 2px solid #006241; /* 深色黑框 */
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            color: #006241;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 左邊藍色系按鈕 */
        .btn-home { background: #E0F6FF; }
        .btn-home:hover {
            background: #00704A; color: white; border-color: #00704A;
            transform: translateY(-3px); box-shadow: 0 10px 20px rgba(93, 173, 226, 0.3);
        }

        /* 右邊綠色系按鈕 */
        .btn-action { background: #f2f6f4; }
        .btn-action:hover {
            background: #00704A; color: white; border-color: #00704A;
            transform: translateY(-3px); box-shadow: 0 10px 20px rgba(72, 201, 176, 0.3);
        }

        /* 倒數計時文字 */
        .timer-text {
            margin-top: 25px;
            color: #888;
            font-size: 15px;
            font-weight: 500;
        }
        .timer-text span {
            color: #00704A;
            font-size: 22px;
            font-weight: 900;
            margin: 0 5px;
        }

        @media (max-width: 600px) {
            .glass-card { padding: 25px; }
            .professor-box { padding: 40px 15px 30px 15px; }
            .msg-title { font-size: 30px; }
            .msg-welcome { font-size: 22px; }
            .btn-group { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="background-pattern"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>

    <div class="glass-card">
        <div class="professor-box">
            <i class="fa-solid fa-circle-check success-icon"></i>
            
            <h1 class="msg-title" id="display-title">會員註冊成功</h1>
            <h2 class="msg-welcome" id="display-welcome">歡迎 <span id="user-name">薛翔謙</span> 成為會員</h2>
            
            <div class="btn-group">
                <a href="index.html" class="btn-custom btn-home"><i class="fa-solid fa-house"></i> 點選回首頁</a>
                <a href="login.html" class="btn-custom btn-action" id="action-link"><i class="fa-solid fa-arrow-right-to-bracket"></i> 點選立即登入</a>
            </div>

            <div class="timer-text">
                系統將在 <span id="sec">3</span> 秒後自動導向主頁面...
            </div>
        </div>
    </div>

    <script>
        // 抓取網址參數
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const name = params.get('name') || '薛翔謙';

        const titleEl = document.getElementById('display-title');
        const welcomeEl = document.getElementById('display-welcome');
        const actionLink = document.getElementById('action-link');

        // 根據來源變更顯示內容
        if (type === 'login') {
            titleEl.innerText = "會員登入成功";
            welcomeEl.innerHTML = `歡迎 <span style="color:#006241;">${name}</span> 回來`;
            actionLink.innerHTML = `<i class="fa-solid fa-cart-shopping"></i> 前往購物車`;
            actionLink.href = "cart.html";
        } else {
            titleEl.innerText = "會員註冊成功";
            welcomeEl.innerHTML = `歡迎 <span style="color:#006241;">${name}</span> 成為會員`;
            actionLink.innerHTML = `<i class="fa-solid fa-arrow-right-to-bracket"></i> 點選立即登入`;
            actionLink.href = "login.html";
        }

        // 自動跳轉倒數邏輯
        let count = 3;
        const secEl = document.getElementById('sec');
        const timer = setInterval(() => {
            count--;
            secEl.innerText = count;
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = "index.html";
            }
        }, 1000);
    </script>
</body>
</html>
